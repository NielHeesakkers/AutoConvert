name: Version Bump

on:
  push:
    branches:
      - main

jobs:
  bump-version:
    # Skip if commit message contains [skip ci]
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get commit messages from push
        id: commits
        run: |
          # Get the commits included in this push
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"

          # Handle first push (before is all zeros)
          if echo "$BEFORE" | grep -qE '^0+$'; then
            # First push: use only the head commit message
            MESSAGES=$(git log -1 --pretty=format:'%s' "$AFTER")
          else
            # Normal push: get all commit messages between before and after
            MESSAGES=$(git log --pretty=format:'%s' "${BEFORE}..${AFTER}")
          fi

          # Write to file to preserve newlines and special characters
          echo "$MESSAGES" > /tmp/commit_messages.txt

          # Debug output
          echo "Commit messages:"
          cat /tmp/commit_messages.txt

      - name: Bump version and update history
        run: |
          # Read current version
          CURRENT_VERSION=$(jq -r '.version' version.json)
          echo "Current version: $CURRENT_VERSION"

          # Split version into major and minor parts and increment minor by 1
          MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
          NEW_MINOR=$((MINOR + 1))
          NEW_VERSION="${MAJOR}.${NEW_MINOR}"
          echo "New version: $NEW_VERSION"

          # Get today's date
          TODAY=$(date -u +"%Y-%m-%d")

          # Build the changes array from commit messages
          CHANGES_JSON="[]"
          while IFS= read -r line; do
            # Skip empty lines
            [ -z "$line" ] && continue
            # Skip lines that are version bump commits (extra safety)
            echo "$line" | grep -q '\[skip ci\]' && continue
            CHANGES_JSON=$(echo "$CHANGES_JSON" | jq --arg msg "$line" '. + [$msg]')
          done < /tmp/commit_messages.txt

          # Only proceed if there are actual changes
          if [ "$(echo "$CHANGES_JSON" | jq 'length')" -eq 0 ]; then
            echo "No commit messages to record, skipping version bump."
            exit 0
          fi

          # Build the new history entry
          NEW_ENTRY=$(jq -n \
            --arg version "$NEW_VERSION" \
            --arg date "$TODAY" \
            --argjson changes "$CHANGES_JSON" \
            '{version: $version, date: $date, changes: $changes}')

          # Update version.json: set new version and prepend entry to history
          jq --arg newVersion "$NEW_VERSION" \
             --argjson newEntry "$NEW_ENTRY" \
             '.version = $newVersion | .history = [$newEntry] + .history' \
             version.json > version_tmp.json

          mv version_tmp.json version.json

          # Show result
          echo "Updated version.json:"
          cat version.json

          # Export new version for the commit step
          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"

      - name: Commit and push updated version.json
        run: |
          # Only commit if version.json was actually changed
          if git diff --quiet version.json; then
            echo "No changes to version.json, skipping commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add version.json
          git commit -m "chore: versie ${NEW_VERSION} [skip ci]"
          git push
