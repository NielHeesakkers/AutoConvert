<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoConvert</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }
    .container { max-width: 800px; margin: 0 auto; padding: 20px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 24px; color: #fff; }
    h1 span { color: #6366f1; }

    .card { background: #1a1d27; border-radius: 12px; margin-bottom: 16px; border: 1px solid #2a2d3a; transition: opacity 0.2s, box-shadow 0.2s; }
    .card.dragging { opacity: 0.5; }
    .card.drag-over { box-shadow: 0 -3px 0 0 #6366f1; }
    .card-header { display: flex; align-items: center; padding: 16px 20px; cursor: pointer; user-select: none; gap: 10px; }
    .card-header:hover { background: rgba(255,255,255,0.02); border-radius: 12px; }
    .card-body { padding: 0 20px 20px; }
    .card.collapsed .card-body { display: none; }
    .card.collapsed .card-header { padding-bottom: 16px; }
    .card-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #888; flex: 1; }
    .card-chevron { color: #555; font-size: 12px; transition: transform 0.2s; }
    .card.collapsed .card-chevron { transform: rotate(-90deg); }
    .drag-handle { color: #444; cursor: grab; font-size: 14px; padding: 0 4px; line-height: 1; }
    .drag-handle:active { cursor: grabbing; }
    .drag-handle:hover { color: #888; }

    /* Status */
    .status-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .status-indicator { display: flex; align-items: center; gap: 8px; font-size: 15px; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .status-dot.idle { background: #4ade80; }
    .status-dot.running { background: #f59e0b; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .btn { padding: 8px 18px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #5558e6; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-danger:hover:not(:disabled) { background: #dc2626; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }

    /* Schedule */
    .schedule-row { display: flex; align-items: center; gap: 8px; }
    select, input[type="email"], input[type="text"], input[type="password"], input[type="number"] { background: #0f1117; border: 1px solid #2a2d3a; color: #e0e0e0; border-radius: 6px; padding: 8px 12px; font-size: 14px; }
    select:focus, input:focus { outline: none; border-color: #6366f1; }

    /* SMTP form */
    .smtp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .smtp-grid.full { grid-template-columns: 1fr; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 12px; color: #888; }
    .form-group input { width: 100%; }
    .smtp-toggles { display: flex; gap: 16px; align-items: center; margin-top: 8px; font-size: 13px; }
    .smtp-toggles label { display: flex; align-items: center; gap: 6px; cursor: pointer; color: #aaa; }
    .smtp-actions { display: flex; gap: 8px; margin-top: 14px; }

    /* Recipients */
    .email-list { list-style: none; margin-bottom: 12px; }
    .email-list li { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: #0f1117; border-radius: 6px; margin-bottom: 6px; font-size: 14px; }
    .email-list li.inactive { opacity: 0.45; }
    .email-list li .email-addr { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
    .email-list li button { background: none; border: none; cursor: pointer; font-size: 14px; padding: 0 4px; }
    .email-actions { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
    .btn-icon { color: #888; font-size: 16px; }
    .btn-icon:hover { color: #e0e0e0; }
    .btn-icon.delete { color: #ef4444; }
    .btn-icon.delete:hover { color: #f87171; }
    .toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider { position: absolute; inset: 0; background: #333; border-radius: 20px; cursor: pointer; transition: 0.2s; }
    .toggle .slider:before { content: ''; position: absolute; width: 16px; height: 16px; left: 2px; top: 2px; background: #888; border-radius: 50%; transition: 0.2s; }
    .toggle input:checked + .slider { background: #6366f1; }
    .toggle input:checked + .slider:before { transform: translateX(16px); background: #fff; }
    .add-row { display: flex; gap: 8px; }
    .add-row input { flex: 1; }
    .test-all-row { margin-top: 12px; padding-top: 12px; border-top: 1px solid #2a2d3a; }

    /* Log */
    .log-box { background: #0a0c10; border-radius: 8px; padding: 14px; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; line-height: 1.6; color: #9ca3af; max-height: 400px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; }

    .toast { position: fixed; bottom: 20px; right: 20px; background: #22c55e; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; }
    .toast.error { background: #ef4444; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="container">
    <h1><span>Auto</span>Convert</h1>
    <div id="cardContainer">

      <!-- Status -->
      <div class="card" data-section="status" draggable="true">
        <div class="card-header">
          <span class="drag-handle" title="Versleep">&#9776;</span>
          <span class="card-title">Status</span>
          <span class="card-chevron">&#9660;</span>
        </div>
        <div class="card-body">
          <div class="status-row">
            <div class="status-indicator">
              <div class="status-dot idle" id="statusDot"></div>
              <span id="statusText">Inactief</span>
            </div>
            <div style="display:flex;gap:8px;">
              <button class="btn btn-primary" id="btnStart" onclick="startConvert()">Start Conversie</button>
              <button class="btn btn-danger" id="btnStop" onclick="stopConvert()" style="display:none;">Stop</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Schedule -->
      <div class="card" data-section="schedule" draggable="true">
        <div class="card-header">
          <span class="drag-handle" title="Versleep">&#9776;</span>
          <span class="card-title">Planning</span>
          <span class="card-chevron">&#9660;</span>
        </div>
        <div class="card-body">
          <div class="schedule-row">
            <span>Dagelijks om</span>
            <select id="schedHour"></select>
            <span>:</span>
            <select id="schedMin"></select>
            <button class="btn btn-primary btn-sm" onclick="saveSchedule()">Opslaan</button>
          </div>
        </div>
      </div>

      <!-- SMTP -->
      <div class="card" data-section="smtp" draggable="true">
        <div class="card-header">
          <span class="drag-handle" title="Versleep">&#9776;</span>
          <span class="card-title">Mailserver (SMTP)</span>
          <span class="card-chevron">&#9660;</span>
        </div>
        <div class="card-body">
          <div class="smtp-grid">
            <div class="form-group">
              <label>SMTP Host</label>
              <input type="text" id="smtpHost" placeholder="smtp.example.com">
            </div>
            <div class="form-group">
              <label>Poort</label>
              <input type="number" id="smtpPort" placeholder="587" min="1" max="65535">
            </div>
          </div>
          <div class="smtp-grid" style="margin-top:12px;">
            <div class="form-group">
              <label>Gebruikersnaam</label>
              <input type="text" id="smtpUser" placeholder="user@example.com">
            </div>
            <div class="form-group">
              <label>Wachtwoord</label>
              <input type="password" id="smtpPassword" placeholder="••••••••">
            </div>
          </div>
          <div class="smtp-grid full" style="margin-top:12px;">
            <div class="form-group">
              <label>Afzender (From)</label>
              <input type="text" id="smtpFrom" placeholder="niel@example.com">
            </div>
          </div>
          <div class="smtp-toggles">
            <label><input type="checkbox" id="smtpTls" checked> TLS</label>
            <label><input type="checkbox" id="smtpStarttls" checked> STARTTLS</label>
          </div>
          <div class="smtp-actions">
            <button class="btn btn-primary btn-sm" onclick="saveSmtp()">Opslaan</button>
          </div>
        </div>
      </div>

      <!-- Recipients -->
      <div class="card" data-section="recipients" draggable="true">
        <div class="card-header">
          <span class="drag-handle" title="Versleep">&#9776;</span>
          <span class="card-title">E-mail ontvangers</span>
          <span class="card-chevron">&#9660;</span>
        </div>
        <div class="card-body">
          <ul class="email-list" id="emailList"></ul>
          <div class="add-row">
            <input type="email" id="newEmail" placeholder="naam@voorbeeld.nl" onkeydown="if(event.key==='Enter')addEmail()">
            <button class="btn btn-primary btn-sm" onclick="addEmail()">Toevoegen</button>
          </div>
          <div class="test-all-row">
            <button class="btn btn-primary btn-sm" onclick="testAllActive()" id="btnTestAll">Test mail versturen naar alle actieve ontvangers</button>
          </div>
        </div>
      </div>

      <!-- Log -->
      <div class="card" data-section="log" draggable="true">
        <div class="card-header">
          <span class="drag-handle" title="Versleep">&#9776;</span>
          <span class="card-title">Log</span>
          <span class="card-chevron">&#9660;</span>
        </div>
        <div class="card-body">
          <div class="log-box" id="logBox">Laden...</div>
        </div>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // --- Layout: drag & drop + collapse ---
    const LAYOUT_KEY = 'autoconvert_layout';

    function saveLayout() {
      const container = document.getElementById('cardContainer');
      const cards = container.querySelectorAll('.card[data-section]');
      const layout = {};
      cards.forEach((card, i) => {
        layout[card.dataset.section] = {
          order: i,
          collapsed: card.classList.contains('collapsed'),
        };
      });
      localStorage.setItem(LAYOUT_KEY, JSON.stringify(layout));
    }

    function restoreLayout() {
      const saved = localStorage.getItem(LAYOUT_KEY);
      if (!saved) return;
      try {
        const layout = JSON.parse(saved);
        const container = document.getElementById('cardContainer');
        const cards = Array.from(container.querySelectorAll('.card[data-section]'));
        // Sort cards by saved order
        cards.sort((a, b) => {
          const oa = layout[a.dataset.section]?.order ?? 99;
          const ob = layout[b.dataset.section]?.order ?? 99;
          return oa - ob;
        });
        cards.forEach(card => {
          container.appendChild(card);
          if (layout[card.dataset.section]?.collapsed) {
            card.classList.add('collapsed');
          }
        });
      } catch {}
    }

    // Collapse/expand on header click
    document.addEventListener('click', (e) => {
      const header = e.target.closest('.card-header');
      if (!header) return;
      // Don't toggle if clicking the drag handle
      if (e.target.closest('.drag-handle')) return;
      header.closest('.card').classList.toggle('collapsed');
      saveLayout();
    });

    // Drag and drop
    let dragCard = null;

    document.addEventListener('dragstart', (e) => {
      const handle = e.target.closest('.drag-handle');
      if (!handle) {
        // Only allow drag from handle
        e.preventDefault();
        return;
      }
      dragCard = handle.closest('.card');
      dragCard.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', '');
    });

    document.addEventListener('dragend', (e) => {
      if (dragCard) {
        dragCard.classList.remove('dragging');
        dragCard = null;
      }
      document.querySelectorAll('.card.drag-over').forEach(c => c.classList.remove('drag-over'));
    });

    document.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const target = e.target.closest('.card[data-section]');
      if (!target || target === dragCard) return;
      document.querySelectorAll('.card.drag-over').forEach(c => c.classList.remove('drag-over'));
      target.classList.add('drag-over');
    });

    document.addEventListener('dragleave', (e) => {
      const target = e.target.closest('.card[data-section]');
      if (target) target.classList.remove('drag-over');
    });

    document.addEventListener('drop', (e) => {
      e.preventDefault();
      const target = e.target.closest('.card[data-section]');
      if (!target || !dragCard || target === dragCard) return;
      target.classList.remove('drag-over');
      const container = document.getElementById('cardContainer');
      const cards = Array.from(container.querySelectorAll('.card[data-section]'));
      const dragIdx = cards.indexOf(dragCard);
      const targetIdx = cards.indexOf(target);
      if (dragIdx < targetIdx) {
        target.after(dragCard);
      } else {
        target.before(dragCard);
      }
      saveLayout();
    });

    // Make only drag handle trigger native drag
    document.querySelectorAll('.card[data-section]').forEach(card => {
      card.addEventListener('dragstart', (e) => {
        if (!e.target.closest('.drag-handle')) {
          e.preventDefault();
        }
      });
    });

    // --- Toast ---
    function toast(msg, error = false) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast show' + (error ? ' error' : '');
      setTimeout(() => el.className = 'toast', 2500);
    }

    // --- Status ---
    async function loadStatus() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        const dot = document.getElementById('statusDot');
        const text = document.getElementById('statusText');
        const btnStart = document.getElementById('btnStart');
        const btnStop = document.getElementById('btnStop');
        if (data.running) {
          dot.className = 'status-dot running';
          text.textContent = 'Conversie actief...';
          btnStart.disabled = true;
          btnStop.style.display = '';
        } else {
          dot.className = 'status-dot idle';
          text.textContent = 'Inactief';
          btnStart.disabled = false;
          btnStop.style.display = 'none';
        }
      } catch {}
    }

    async function startConvert() {
      try {
        const res = await fetch('/api/convert', { method: 'POST' });
        const data = await res.json();
        if (data.started) {
          toast('Conversie gestart');
          loadStatus();
        } else {
          toast(data.error || 'Fout', true);
        }
      } catch { toast('Fout bij starten', true); }
    }

    async function stopConvert() {
      if (!confirm('Weet je zeker dat je de conversie wilt stoppen?')) return;
      try {
        const res = await fetch('/api/convert/stop', { method: 'POST' });
        const data = await res.json();
        if (data.stopped) {
          toast('Conversie gestopt');
          setTimeout(loadStatus, 1000);
        } else {
          toast(data.error || 'Fout', true);
        }
      } catch { toast('Fout bij stoppen', true); }
    }

    // --- Schedule ---
    function initScheduleSelects() {
      const h = document.getElementById('schedHour');
      const m = document.getElementById('schedMin');
      for (let i = 0; i < 24; i++) {
        h.innerHTML += `<option value="${i}">${String(i).padStart(2, '0')}</option>`;
      }
      for (let i = 0; i < 60; i += 5) {
        m.innerHTML += `<option value="${i}">${String(i).padStart(2, '0')}</option>`;
      }
    }

    async function loadSchedule() {
      try {
        const res = await fetch('/api/schedule');
        const data = await res.json();
        document.getElementById('schedHour').value = data.hour;
        const snapped = Math.round(data.minute / 5) * 5;
        document.getElementById('schedMin').value = snapped >= 60 ? 55 : snapped;
      } catch {}
    }

    async function saveSchedule() {
      const hour = parseInt(document.getElementById('schedHour').value);
      const minute = parseInt(document.getElementById('schedMin').value);
      try {
        const res = await fetch('/api/schedule', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ hour, minute }),
        });
        const data = await res.json();
        if (data.ok) toast('Planning opgeslagen');
        else toast(data.error || 'Fout', true);
      } catch { toast('Fout bij opslaan', true); }
    }

    // --- SMTP ---
    async function loadSmtp() {
      try {
        const res = await fetch('/api/smtp');
        const data = await res.json();
        document.getElementById('smtpHost').value = data.host;
        document.getElementById('smtpPort').value = data.port;
        document.getElementById('smtpUser').value = data.user;
        document.getElementById('smtpPassword').value = data.password;
        document.getElementById('smtpFrom').value = data.from;
        document.getElementById('smtpTls').checked = data.tls;
        document.getElementById('smtpStarttls').checked = data.starttls;
      } catch {}
    }

    async function saveSmtp() {
      const smtp = {
        host: document.getElementById('smtpHost').value.trim(),
        port: parseInt(document.getElementById('smtpPort').value, 10),
        user: document.getElementById('smtpUser').value.trim(),
        password: document.getElementById('smtpPassword').value,
        from: document.getElementById('smtpFrom').value.trim(),
        tls: document.getElementById('smtpTls').checked,
        starttls: document.getElementById('smtpStarttls').checked,
      };
      if (!smtp.host || !smtp.user || !smtp.from) {
        toast('Vul host, gebruiker en afzender in', true);
        return;
      }
      try {
        const res = await fetch('/api/smtp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(smtp),
        });
        const data = await res.json();
        if (data.ok) toast('Mailserver opgeslagen');
        else toast(data.error || 'Fout', true);
      } catch { toast('Fout bij opslaan', true); }
    }

    // --- Recipients ---
    let recipients = [];

    async function loadRecipients() {
      try {
        const res = await fetch('/api/recipients');
        const data = await res.json();
        recipients = data.recipients;
        renderRecipients();
      } catch {}
    }

    function renderRecipients() {
      const list = document.getElementById('emailList');
      list.innerHTML = recipients.map((r, i) =>
        `<li class="${r.active ? '' : 'inactive'}">
          <label class="toggle">
            <input type="checkbox" ${r.active ? 'checked' : ''} onchange="toggleEmail('${r.email}')">
            <span class="slider"></span>
          </label>
          <span class="email-addr">${r.email}</span>
          <div class="email-actions">
            <button class="btn-icon" onclick="testEmail('${r.email}')" title="Test mail versturen">&#9993;</button>
            <button class="btn-icon delete" onclick="removeEmail(${i})" title="Verwijderen">&times;</button>
          </div>
        </li>`
      ).join('');
    }

    async function saveRecipients() {
      try {
        const res = await fetch('/api/recipients', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ recipients }),
        });
        const data = await res.json();
        if (!data.ok) toast(data.error || 'Fout', true);
      } catch { toast('Fout bij opslaan', true); }
    }

    async function addEmail() {
      const input = document.getElementById('newEmail');
      const email = input.value.trim();
      if (!email) return;
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        toast('Ongeldig e-mailadres', true);
        return;
      }
      if (recipients.find(r => r.email === email)) {
        toast('Adres bestaat al', true);
        return;
      }
      recipients.push({ email, active: true });
      renderRecipients();
      input.value = '';
      await saveRecipients();
      toast('Ontvanger toegevoegd');
    }

    async function removeEmail(index) {
      const removed = recipients.splice(index, 1)[0];
      renderRecipients();
      await saveRecipients();
      toast(`${removed.email} verwijderd`);
    }

    async function toggleEmail(email) {
      try {
        const res = await fetch('/api/recipients/toggle', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();
        if (data.ok) {
          const r = recipients.find(r => r.email === email);
          if (r) r.active = data.active;
          renderRecipients();
          toast(`${email} ${data.active ? 'geactiveerd' : 'gedeactiveerd'}`);
        } else {
          toast(data.error || 'Fout', true);
        }
      } catch { toast('Fout bij togglen', true); }
    }

    async function testEmail(email) {
      toast(`Test mail versturen naar ${email}...`);
      try {
        const res = await fetch('/api/test-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email }),
        });
        const data = await res.json();
        if (data.ok) toast(`Test mail verstuurd naar ${email}`);
        else toast(data.error || 'Fout bij versturen', true);
      } catch { toast('Fout bij versturen', true); }
    }

    async function testAllActive() {
      const active = recipients.filter(r => r.active);
      if (active.length === 0) {
        toast('Geen actieve ontvangers', true);
        return;
      }
      document.getElementById('btnTestAll').disabled = true;
      let ok = 0, fail = 0;
      for (const r of active) {
        try {
          const res = await fetch('/api/test-email', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: r.email }),
          });
          const data = await res.json();
          if (data.ok) ok++; else fail++;
        } catch { fail++; }
      }
      document.getElementById('btnTestAll').disabled = false;
      if (fail === 0) toast(`Test mail verstuurd naar ${ok} ontvanger(s)`);
      else toast(`${ok} verstuurd, ${fail} mislukt`, true);
    }

    // --- Log ---
    async function loadLog() {
      try {
        const res = await fetch('/api/logs/history');
        const text = await res.text();
        const box = document.getElementById('logBox');
        box.textContent = text || 'Geen log beschikbaar.';
        box.scrollTop = box.scrollHeight;
      } catch {}
    }

    function connectLogStream() {
      const es = new EventSource('/api/logs');
      const box = document.getElementById('logBox');
      es.onmessage = (e) => {
        try {
          const text = JSON.parse(e.data);
          box.textContent += text;
          box.scrollTop = box.scrollHeight;
        } catch {}
      };
      es.onerror = () => {
        es.close();
        setTimeout(connectLogStream, 5000);
      };
    }

    // --- Init ---
    restoreLayout();
    initScheduleSelects();
    loadStatus();
    loadSchedule();
    loadSmtp();
    loadRecipients();
    loadLog();
    connectLogStream();
    setInterval(loadStatus, 5000);
  </script>
</body>
</html>
