<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AutoConvert — Login</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .login-card { background: #151820; border: 1px solid #1e2130; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; }
    .login-logo { font-size: 28px; font-weight: 700; text-align: center; margin-bottom: 8px; }
    .login-logo span { color: #6366f1; }
    .login-sub { text-align: center; font-size: 14px; color: #888; margin-bottom: 32px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #aaa; margin-bottom: 6px; }
    .form-group input { width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid #2a2d3a; background: #1a1d28; color: #e0e0e0; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .form-group input:focus { border-color: #6366f1; }
    .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
    .btn-primary { background: #6366f1; color: #fff; }
    .btn-primary:hover { background: #5558e6; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 18px; display: none; }
    .setup-note { text-align: center; font-size: 12px; color: #555; margin-top: 20px; }
    .login-icon { text-align: center; font-size: 48px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-icon">🎬</div>
    <div class="login-logo">Auto<span>Convert</span></div>
    <div class="login-sub" id="loginSub">Sign in to continue</div>

    <div class="error-msg" id="errorMsg"></div>

    <div id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">Sign in</button>
    </div>

    <div id="setupForm" style="display:none;">
      <div class="form-group">
        <label>Choose a username</label>
        <input type="text" id="setupUser" autocomplete="username" autofocus>
      </div>
      <div class="form-group">
        <label>Choose a password</label>
        <input type="password" id="setupPass" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label>Confirm password</label>
        <input type="password" id="setupPass2" autocomplete="new-password">
      </div>
      <button class="btn btn-primary" id="setupBtn" onclick="doSetup()">Create account</button>
    </div>

    <div class="setup-note" id="setupNote"></div>
  </div>

  <script>
    const errorEl = document.getElementById('errorMsg');
    function showError(msg) { errorEl.textContent = msg; errorEl.style.display = 'block'; }
    function hideError() { errorEl.style.display = 'none'; }

    // Check auth status on load
    fetch('/api/auth/status').then(r => r.json()).then(data => {
      if (data.loggedIn) {
        window.location.href = '/';
        return;
      }
      if (!data.authEnabled) {
        // No users — show setup form
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('setupForm').style.display = 'block';
        document.getElementById('loginSub').textContent = 'Create your account to get started';
      }
    });

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (document.getElementById('setupForm').style.display !== 'none') doSetup();
        else doLogin();
      }
    });

    async function doLogin() {
      hideError();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) return showError('Fill in both fields');
      document.getElementById('loginBtn').disabled = true;
      try {
        const r = await fetch('/api/auth/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await r.json();
        if (!r.ok) { showError(data.error || 'Login failed'); return; }
        window.location.href = '/';
      } catch { showError('Connection error'); }
      finally { document.getElementById('loginBtn').disabled = false; }
    }

    async function doSetup() {
      hideError();
      const username = document.getElementById('setupUser').value.trim();
      const password = document.getElementById('setupPass').value;
      const password2 = document.getElementById('setupPass2').value;
      if (!username || !password) return showError('Fill in all fields');
      if (password !== password2) return showError('Passwords don\'t match');
      if (password.length < 4) return showError('Password must be at least 4 characters');
      document.getElementById('setupBtn').disabled = true;
      try {
        const r = await fetch('/api/auth/setup', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await r.json();
        if (!r.ok) { showError(data.error || 'Setup failed'); return; }
        window.location.href = '/';
      } catch { showError('Connection error'); }
      finally { document.getElementById('setupBtn').disabled = false; }
    }
  </script>
</body>
</html>
