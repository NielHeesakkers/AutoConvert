services:
  autoconvert:
    build:
      context: https://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@github.com/NielHeesakkers/AutoConvert.git#main
    container_name: autoconvert
    restart: unless-stopped
    ports:
      - "3742:3742"
    volumes:
      - ./config:/app/config        # Config (config.json + preset)
      - ./logs:/app/logs             # Logs + reports
      - ./backups:/backup            # Backups
      - /path/to/movies:/media/movies    # Media: movies
      - /path/to/series:/media/series    # Media: series
    environment:
      - DOCKER=true
      - TZ=Europe/Amsterdam
