services:
  autoconvert:
    build:
      context: https://[token]@github.com/NielHeesakkers/AutoConvert.git#main
    container_name: autoconvert
    restart: unless-stopped
    ports:
      - "3742:3742"
    volumes:
      - /Users/server/Docker/Config:/app/config
      - /Users/server/Docker/Logs:/app/logs
      - /Users/server/Docker/Backups:/backup
      - nas_movies:/media/movies
      - nas_series:/media/series
    environment:
      - DOCKER=true
      - TZ=Europe/Amsterdam

# Direct CIFS mount to Synology NAS
volumes:
  nas_movies:
    driver: local
    driver_opts:
      type: cifs
      device: "//192.168.1.10/Media/Movies"
      o: "username=[user],password=[pass],uid=1000,gid=1000,vers=3.0"
  nas_series:
    driver: local
    driver_opts:
      type: cifs
      device: "//192.168.1.10/Media/Series"
      o: "username=[user],password=[pass],uid=1000,gid=1000,vers=3.0"
