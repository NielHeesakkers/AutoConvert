services:
  autoconvert:
    build:
      context: https://[token]@github.com/NielHeesakkers/AutoConvert.git#main
    container_name: autoconvert
    restart: unless-stopped
    privileged: true
    ports:
      - "3742:3742"
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
      - ./backups:/backup
    environment:
      - DOCKER=true
      - TZ=Europe/Amsterdam
      - NAS_IP=
      - NAS_USER=
      - NAS_PASS=
      - NAS_MOVIES_SHARE=/Media/Movies
      - NAS_SERIES_SHARE=/Media/Series
