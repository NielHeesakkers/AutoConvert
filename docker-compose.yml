services:
  autoconvert:
    build:
      context: https://[token]@github.com/NielHeesakkers/AutoConvert.git#main
    image: ghcr.io/nielheesakkers/autoconvert:latest
    container_name: autoconvert
    restart: unless-stopped
    ports:
      - "3742:3742"
    volumes:
      - ./config:/app/config        # Config (config.json + preset)
      - ./logs:/app/logs             # Logs + reports
      - ./backups:/backup            # Backups
      - nas_movies:/media/movies     # Synology NAS: movies
      - nas_series:/media/series     # Synology NAS: series
    environment:
      - DOCKER=true
      - TZ=Europe/Amsterdam

# Direct SMB/CIFS mount to Synology (bypasses macOS, real file content)
volumes:
  nas_movies:
    driver: local
    driver_opts:
      type: cifs
      device: "//NAS_IP/SHARE/path/to/movies"   # ← bijv. //192.168.1.100/video/movies
      o: "username=USER,password=PASS,uid=1000,gid=1000,vers=3.0"
  nas_series:
    driver: local
    driver_opts:
      type: cifs
      device: "//NAS_IP/SHARE/path/to/series"   # ← bijv. //192.168.1.100/video/series
      o: "username=USER,password=PASS,uid=1000,gid=1000,vers=3.0"
